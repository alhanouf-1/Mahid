<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>مهّد | Mahid</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Syne:wght@700;800&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #05080f;
      --s1: #0a1020;
      --s2: #0e1628;
      --s3: #121d34;
      --s4: #172340;
      --text: #ddeaff;
      --t2: #8ba3c9;
      --t3: #4d6a92;
      --blue: #3b82f6;
      --blue2: #60a5fa;
      --teal: #00d4a8;
      --teal2: #00f5c8;
      --red: #f43f5e;
      --amber: #f59e0b;
      --border: rgba(255, 255, 255, .07);
      --border2: rgba(255, 255, 255, .13);
      --glow-blue: rgba(59, 130, 246, .28);
      --glow-teal: rgba(0, 212, 168, .22);
      --r: 12px;
      --r2: 18px;
      --r3: 24px;
      --max: 1160px;
      --nav: 64px;
      --shadow: 0 8px 32px rgba(0, 0, 0, .45);
      --shadow2: 0 20px 60px rgba(0, 0, 0, .55);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      height: 100%
    }

    body {
      font-family: 'Tajawal', sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 1100px 700px at 10% -5%, rgba(59, 130, 246, .16), transparent 55%),
        radial-gradient(ellipse 900px 600px at 92% 8%, rgba(0, 212, 168, .12), transparent 50%),
        radial-gradient(ellipse 700px 500px at 50% 105%, rgba(59, 130, 246, .09), transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    body>* {
      position: relative;
      z-index: 1
    }

    a {
      color: var(--blue2);
      text-decoration: none
    }

    a:hover {
      color: #93c5fd
    }

    ::-webkit-scrollbar {
      width: 5px
    }

    ::-webkit-scrollbar-track {
      background: var(--bg)
    }

    ::-webkit-scrollbar-thumb {
      background: var(--s4);
      border-radius: 99px
    }

    .wrap {
      width: min(var(--max), calc(100% - 36px));
      margin: 0 auto
    }

    /* NAV */
    .nav {
      position: sticky;
      top: 0;
      z-index: 200;
      height: var(--nav);
      background: rgba(5, 8, 15, .8);
      backdrop-filter: blur(18px) saturate(1.6);
      border-bottom: 1px solid var(--border)
    }

    .nav-i {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      flex-shrink: 0;
      cursor: pointer
    }

    .brand-m {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      background: linear-gradient(135deg, var(--blue), #818cf8);
      display: grid;
      place-items: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 17px;
      color: #fff;
      box-shadow: 0 0 18px var(--glow-blue);
      flex-shrink: 0
    }

    .brand-name {
      font-size: 19px;
      font-weight: 800;
      letter-spacing: -.2px
    }

    .brand-sub {
      font-size: 11px;
      color: var(--t3);
      margin-top: -2px
    }

    .nav-r {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap
    }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 8px 16px;
      border-radius: var(--r);
      border: 1px solid var(--border2);
      background: rgba(255, 255, 255, .055);
      color: var(--text);
      font-family: 'Tajawal', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .18s;
      white-space: nowrap;
      text-decoration: none
    }

    .btn:hover {
      background: rgba(255, 255, 255, .09);
      border-color: var(--border2);
      color: var(--text);
      transform: translateY(-1px);
      text-decoration: none
    }

    .btn:active {
      transform: translateY(0)
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--blue), #6366f1);
      border: none;
      color: #fff;
      box-shadow: 0 4px 16px var(--glow-blue)
    }

    .btn-primary:hover {
      filter: brightness(1.12);
      color: #fff;
      box-shadow: 0 6px 24px var(--glow-blue)
    }

    .btn-teal {
      background: linear-gradient(135deg, #00b894, var(--teal));
      border: none;
      color: #003d30;
      box-shadow: 0 4px 16px var(--glow-teal)
    }

    .btn-teal:hover {
      filter: brightness(1.08);
      color: #003d30
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--t2)
    }

    .btn-ghost:hover {
      background: var(--s2);
      color: var(--text)
    }

    .btn-red {
      background: rgba(244, 63, 94, .1);
      border: 1px solid rgba(244, 63, 94, .28);
      color: #fb7185
    }

    .btn-red:hover {
      background: rgba(244, 63, 94, .18);
      color: #fda4af
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 13px;
      border-radius: 10px
    }

    .btn-lg {
      padding: 13px 28px;
      font-size: 16px;
      border-radius: 14px
    }

    /* PANELS */
    .panel {
      background: linear-gradient(160deg, rgba(14, 22, 40, .95), rgba(10, 16, 32, .85));
      border: 1px solid var(--border);
      border-radius: var(--r3);
      padding: 26px;
      box-shadow: var(--shadow)
    }

    .panel-hd {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 4px
    }

    .panel-sub {
      font-size: 13px;
      color: var(--t2);
      margin-bottom: 20px;
      line-height: 1.65
    }

    /* CARDS */
    .card {
      background: rgba(14, 22, 40, .75);
      border: 1px solid var(--border);
      border-radius: var(--r2);
      padding: 18px;
      transition: border-color .2s, background .2s
    }

    .card:hover {
      border-color: var(--border2);
      background: rgba(18, 29, 52, .85)
    }

    /* FORM */
    .form {
      display: grid;
      gap: 13px
    }

    .g2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 13px
    }

    @media(max-width:640px) {
      .g2 {
        grid-template-columns: 1fr
      }
    }

    .field {
      display: grid;
      gap: 5px
    }

    label {
      font-size: 13px;
      font-weight: 600;
      color: var(--t2)
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 11px 14px;
      border-radius: var(--r);
      border: 1px solid var(--border2);
      background: rgba(255, 255, 255, .05);
      color: var(--text);
      font-family: 'Tajawal', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color .2s, box-shadow .2s
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, .15)
    }

    input::placeholder,
    textarea::placeholder {
      color: var(--t3)
    }

    textarea {
      min-height: 88px;
      resize: vertical;
      line-height: 1.65
    }

    select option {
      background: var(--s2)
    }

    .hint {
      font-size: 12px;
      color: var(--t3);
      margin-top: 2px
    }

    /* MESSAGES */
    .msg-ok {
      padding: 10px 14px;
      border-radius: var(--r);
      background: rgba(0, 212, 168, .1);
      border: 1px solid rgba(0, 212, 168, .28);
      color: #5fffd8;
      font-size: 14px
    }

    .msg-err {
      padding: 10px 14px;
      border-radius: var(--r);
      background: rgba(244, 63, 94, .1);
      border: 1px solid rgba(244, 63, 94, .28);
      color: #fb7185;
      font-size: 14px
    }

    /* CHIPS */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 10px
    }

    .chip {
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px solid var(--border2);
      background: rgba(255, 255, 255, .05);
      font-size: 13px;
      color: var(--t2);
      transition: all .15s
    }

    .chip-rm {
      cursor: pointer
    }

    .chip-rm:hover {
      border-color: rgba(244, 63, 94, .45);
      background: rgba(244, 63, 94, .1);
      color: #fb7185
    }

    .chip-ok {
      border-color: rgba(0, 212, 168, .4);
      background: rgba(0, 212, 168, .08);
      color: #5fffd8
    }

    .chip-red {
      border-color: rgba(244, 63, 94, .4);
      background: rgba(244, 63, 94, .08);
      color: #fb7185
    }

    .chip-blue {
      border-color: rgba(59, 130, 246, .4);
      background: rgba(59, 130, 246, .08);
      color: #93c5fd
    }

    .chip-amber {
      border-color: rgba(245, 158, 11, .4);
      background: rgba(245, 158, 11, .08);
      color: #fcd34d
    }

    .empty-chips {
      font-size: 13px;
      color: var(--t3);
      padding: 4px 0
    }

    /* SPLIT */
    .split {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 18px;
      padding: 22px 0 50px
    }

    @media(max-width:860px) {
      .split {
        grid-template-columns: 1fr
      }
    }

    .sidebar {
      position: sticky;
      top: calc(var(--nav) + 14px);
      align-self: start
    }

    .sidebar-box {
      background: rgba(14, 22, 40, .9);
      border: 1px solid var(--border);
      border-radius: var(--r3);
      padding: 8px
    }

    .sidebar-lbl {
      padding: 10px 10px 4px;
      font-size: 10px;
      font-weight: 800;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: .9px
    }

    .slink {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 11px;
      border-radius: var(--r);
      color: var(--t2);
      font-size: 13.5px;
      font-weight: 600;
      transition: all .16s;
      margin-bottom: 1px;
      text-decoration: none
    }

    .slink:hover {
      background: var(--s2);
      color: var(--text);
      text-decoration: none
    }

    .slink.active {
      background: rgba(59, 130, 246, .12);
      color: var(--blue2)
    }

    .slink-ic {
      font-size: 15px;
      width: 20px;
      text-align: center;
      flex-shrink: 0
    }

    .main-grid {
      display: grid;
      gap: 14px
    }

    /* KPI */
    .kpis {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 14px
    }

    @media(max-width:600px) {
      .kpis {
        grid-template-columns: 1fr
      }
    }

    .kpi {
      padding: 14px;
      border-radius: var(--r);
      background: rgba(255, 255, 255, .04);
      border: 1px solid var(--border);
      text-align: center
    }

    .kpi-val {
      font-size: 22px;
      font-weight: 800;
      margin-top: 4px
    }

    .kpi-lbl {
      font-size: 11px;
      color: var(--t3)
    }

    .col-ok {
      color: var(--teal)
    }

    .col-blue {
      color: var(--blue2)
    }

    .col-red {
      color: var(--red)
    }

    .col-amber {
      color: var(--amber)
    }

    /* MATCH RING */
    .match-ring {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 2.5px solid;
      font-size: 14px;
      font-weight: 900;
      flex-shrink: 0
    }

    /* PROGRESS */
    .pbar-bg {
      background: rgba(255, 255, 255, .07);
      border-radius: 999px;
      height: 7px;
      overflow: hidden;
      flex: 1
    }

    .pbar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--blue), var(--teal));
      transition: width .6s ease
    }

    /* MARKET BARS */
    .mbar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border)
    }

    .mbar-row:last-child {
      border-bottom: none
    }

    .mbar-name {
      font-size: 13px;
      font-weight: 700;
      min-width: 110px;
      text-transform: capitalize;
      color: var(--text)
    }

    .mbar-count {
      font-size: 13px;
      font-weight: 800;
      color: var(--t2);
      min-width: 26px;
      text-align: left
    }

    /* GAP BARS */
    .gbar-row {
      display: grid;
      grid-template-columns: 120px 1fr 46px;
      align-items: center;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border)
    }

    .gbar-row:last-child {
      border-bottom: none
    }

    .gbar-skill {
      font-size: 13px;
      font-weight: 700;
      text-transform: capitalize;
      color: var(--text)
    }

    .gbar-gap {
      font-size: 13px;
      font-weight: 900;
      color: var(--red);
      text-align: center
    }

    /* HERO */
    .hero {
      padding: 60px 0 40px
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.12fr .88fr;
      gap: 20px;
      align-items: start
    }

    @media(max-width:860px) {
      .hero-grid {
        grid-template-columns: 1fr
      }
    }

    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 5px 14px;
      border-radius: 999px;
      background: rgba(59, 130, 246, .1);
      border: 1px solid rgba(59, 130, 246, .25);
      color: #93c5fd;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 18px
    }

    .hero-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--blue);
      box-shadow: 0 0 8px var(--blue);
      animation: blink 2s infinite
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: .4;
        transform: scale(.75)
      }
    }

    .hero-h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(26px, 3.8vw, 44px);
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -.5px;
      margin-bottom: 16px
    }

    .hero-h1 span {
      background: linear-gradient(135deg, var(--blue), var(--teal));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text
    }

    .hero-desc {
      color: var(--t2);
      font-size: 15.5px;
      line-height: 1.8;
      margin-bottom: 26px
    }

    .hero-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 36px
    }

    .hero-stats {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      padding-top: 20px;
      border-top: 1px solid var(--border)
    }

    .hstat-val {
      font-size: 22px;
      font-weight: 800
    }

    .hstat-lbl {
      font-size: 11px;
      color: var(--t3);
      margin-top: 1px
    }

    .role-cards {
      display: grid;
      gap: 11px
    }

    .role-card {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 16px;
      border-radius: var(--r2);
      border: 1px solid var(--border);
      background: rgba(14, 22, 40, .7);
      cursor: pointer;
      transition: all .22s;
      text-decoration: none;
      color: var(--text)
    }

    .role-card:hover {
      border-color: var(--border2);
      background: rgba(18, 29, 52, .9);
      transform: translateX(-4px);
      box-shadow: var(--shadow);
      text-decoration: none;
      color: var(--text)
    }

    [lang="en"] .role-card:hover {
      transform: translateX(4px)
    }

    .role-ic {
      width: 42px;
      height: 42px;
      border-radius: 11px;
      display: grid;
      place-items: center;
      font-size: 18px;
      flex-shrink: 0
    }

    .role-lbl {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 3px
    }

    .role-desc {
      font-size: 12px;
      color: var(--t3);
      line-height: 1.5
    }

    /* AUTH */
    .auth-wrap {
      max-width: 560px;
      margin: 40px auto 60px
    }

    /* JOB CARD */
    .jcard {
      background: rgba(14, 22, 40, .75);
      border: 1px solid var(--border);
      border-radius: var(--r2);
      padding: 18px;
      transition: all .2s;
      display: grid;
      gap: 11px
    }

    .jcard:hover {
      border-color: var(--border2);
      box-shadow: var(--shadow)
    }

    .jcard-title {
      font-size: 16px;
      font-weight: 800
    }

    .jcard-meta {
      font-size: 13px;
      color: var(--t3);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center
    }

    .jcard-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center
    }

    /* APPLICANT */
    .acard {
      padding: 14px;
      border-radius: var(--r);
      background: rgba(255, 255, 255, .03);
      border: 1px solid var(--border);
      display: grid;
      gap: 8px;
      transition: border-color .2s
    }

    .acard:hover {
      border-color: var(--border2)
    }

    /* MISC */
    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 14px 0
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700
    }

    .pill-ok {
      background: rgba(0, 212, 168, .1);
      color: var(--teal);
      border: 1px solid rgba(0, 212, 168, .25)
    }

    .pill-red {
      background: rgba(244, 63, 94, .1);
      color: #fb7185;
      border: 1px solid rgba(244, 63, 94, .25)
    }

    .pill-blue {
      background: rgba(59, 130, 246, .1);
      color: var(--blue2);
      border: 1px solid rgba(59, 130, 246, .25)
    }

    .sbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding: 14px;
      border-radius: var(--r2);
      background: rgba(255, 255, 255, .03);
      border: 1px solid var(--border);
      margin-bottom: 4px
    }

    .sbar input {
      background: rgba(255, 255, 255, .06)
    }

    .sh {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px
    }

    .sh-title {
      font-size: 18px;
      font-weight: 800
    }

    .exp-btn {
      font-size: 12px;
      padding: 5px 11px;
      border-radius: 9px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--t3);
      cursor: pointer;
      font-family: 'Tajawal', sans-serif;
      transition: all .18s
    }

    .exp-btn:hover {
      border-color: var(--border2);
      color: var(--t2);
      background: var(--s2)
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .fu {
      animation: fadeUp .38s ease both
    }

    .fu2 {
      animation: fadeUp .38s .07s ease both
    }

    .fu3 {
      animation: fadeUp .38s .14s ease both
    }

    .hidden {
      display: none !important
    }

    .mt-10 {
      margin-top: 10px
    }

    .mt-14 {
      margin-top: 14px
    }

    .flex {
      display: flex
    }

    .flex-wrap {
      flex-wrap: wrap
    }

    .items-end {
      align-items: flex-end
    }

    .gap-8 {
      gap: 8px
    }

    .gap-10 {
      gap: 10px
    }

    .gap-12 {
      gap: 12px
    }

    .w-full {
      width: 100%
    }

    .bold {
      font-weight: 800
    }

    .small {
      font-size: 12px;
      color: var(--t3)
    }
  </style>
</head>

<body>

  <nav class="nav">
    <div class="wrap nav-i">
      <div class="brand" onclick="location.hash='#home'">
        <img src="C:\Users\Alhan\.gemini\antigravity\scratch\logo.png" alt="Mahid Logo" style="width:38px; height:38px; object-fit:cover; border-radius:11px; box-shadow:0 0 18px var(--glow-blue);" />
        <div>
          <div class="brand-name" id="brandName">مهّد</div>
          <div class="brand-sub" id="brandSub">خريجون · شركات · جامعات</div>
        </div>

      if (maj.includes("حاسب") || maj.includes("برمج") || maj.includes("computer") || maj.includes("software") || maj.includes("cs") || maj.includes("it") || maj.includes("تقنية")) catsToCheck.push("software");
      if (maj.includes("بيانات") || maj.includes("data") || maj.includes("ai") || maj.includes("ذكاء") || maj.includes("اصطناعي")) catsToCheck.push("data");
      if (maj.includes("أمن") || maj.includes("سيبراني") || maj.includes("security") || maj.includes("cyber")) catsToCheck.push("security");
      if (maj.includes("عمال") || maj.includes("إدارة") || maj.includes("business") || maj.includes("management") || maj.includes("product") || maj.includes("تسويق") || maj.includes("marketing")) catsToCheck.push("product");

      if (catsToCheck.length > 0) {
        catsToCheck.forEach(c => {
          if (m.categories[c]) m.categories[c].forEach(s => { const n = normS(s); if (!u.has(n)) rec.add(n) });
        });
      } else {
        for (const sk of Object.values(m.categories || {})) { if (!Array.isArray(sk)) continue; if (sk.some(s => u.has(normS(s)))) sk.forEach(s => { const n = normS(s); if (!u.has(n)) rec.add(n) }) }
      }
      ["communication", "presentation", "problem solving", "teamwork", "english"].forEach(s => { if (!u.has(s)) rec.add(s) });
      return Array.from(rec).slice(0, lim);
    }

        jobs.push({ title: "Cybersecurity Analyst / محلل أمن سيبراني", reqs: ["cybersecurity", "network security", "siem"] });
